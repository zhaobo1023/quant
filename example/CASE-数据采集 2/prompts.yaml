# Trade 模块 LLM Prompt 配置

# 财经日历 - 关键催化剂事件搜索
calendar:
  # 用于搜索未来关键市场催化剂事件
  search_catalysts: |
    你是一位专业的A股市场分析师。请联网搜索并整理未来6个月（从{start_date}到{end_date}）
    对中国A股市场有重大影响的关键催化剂事件。

    请关注以下类型的事件：
    1. 中国重要会议：两会、政治局会议（4月/7月/12月）、中央经济工作会议
    2. 中国央行决策：MLF/LPR利率公布日（每月15日/20日前后）
    3. 中国关键数据：CPI/PPI、PMI、GDP、社融、M2、进出口、工业增加值
    4. 美联储FOMC：每次议息会议日期（一年8次，务必全部列出）
    5. 美国关键数据：非农就业（每月第一个周五）、CPI、PPI、GDP、PCE物价指数
    6. 重大政策窗口：A股财报季披露截止日（4/30一季报、8/31中报）、MSCI指数调整
    7. 国际事件：G20峰会、APEC会议、日央行议息会议等

    输出要求：
    - 严格按JSON数组格式输出，不要有其他文字
    - 每个事件包含: date(YYYY-MM-DD), title(中文), country(中国/美国/其他), importance(2或3), category(interest_rate/inflation/employment/pmi/gdp/trade/monetary/policy/other)
    - importance=3 表示对A股影响极大的事件（如每次FOMC会议、两会、非农）
    - importance=2 表示有明显影响的事件
    - 日期尽量精确到天，如果只知道月份就用该月1日
    - 每次FOMC议息会议都要列出（一年8次），每次非农就业报告都要列出（每月第一个周五）
    - 至少输出40个事件

    输出示例:
    [
      {{"date": "2026-03-05", "title": "全国两会开幕", "country": "中国", "importance": 3, "category": "policy"}},
      {{"date": "2026-03-19", "title": "美联储FOMC议息会议", "country": "美国", "importance": 3, "category": "interest_rate"}}
    ]

  # 为每个催化剂事件生成AI提问prompt（批量）
  generate_prompts: |
    你是一位专业的A股市场分析师，需要为以下催化剂事件各生成一段"提问prompt"。
    这些prompt将在事件发生前发送给AI助手进行联网搜索分析。

    事件列表:
    {events_json}

    为每个事件生成prompt，prompt需要包含:
    1. 事件背景：简要说明这个事件是什么
    2. 市场预期：当前市场对此事件的主流预期是什么
    3. 板块影响：可能影响哪些A股板块（具体板块名称）
    4. 超预期情景：如果结果超出预期（偏鸽/偏鹰、高于/低于预期），会怎样
    5. 关注要点：投资者应该重点关注什么

    输出要求:
    - 严格按JSON数组格式输出，不要有其他文字
    - 每个元素: {{"title": "事件标题(和输入一致)", "prompt": "生成的提问prompt"}}
    - prompt字数控制在80-150字，简洁有力，适合作为AI对话的提问
    - prompt以提问形式结尾

    输出示例:
    [
      {{"title": "全国两会开幕", "prompt": "2026年全国两会即将开幕，请联网搜索分析：今年两会的政策重点方向是什么？市场预期哪些行业会获得政策支持？如果财政赤字率超预期提高，对基建、消费板块有什么影响？投资者需要重点关注哪些政策信号？"}}
    ]
